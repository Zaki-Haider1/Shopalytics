services:
  configsvr:
    image: mongo:7.0
    container_name: configsvr
    ports:
      - 27019:27017
    volumes:
      - configsvr_data:/data/db
    command: mongod --configsvr --replSet configReplSet --port 27017 --bind_ip_all
    networks:
      - mongo-cluster

  shard1:
    image: mongo:7.0
    container_name: shard1
    volumes:
      - shard1_data:/data/db
    ports:
      - 27020:27017
    command: mongod --shardsvr --replSet shard1ReplSet --port 27017 --bind_ip_all
    networks:
      - mongo-cluster
  shard2:
    image: mongo:7.0
    container_name: shard2
    volumes:
      - shard2_data:/data/db
    ports:
      - 27021:27017

    networks:
      - mongo-cluster
    command: mongod --shardsvr --replSet shard2ReplSet --port 27017 --bind_ip_all

  shard3:
    image: mongo:7.0
    container_name: shard3
    ports:
      - 27022:27017
    command: mongod --shardsvr --replSet shard3ReplSet --port 27017 --bind_ip_all
    networks:
      - mongo-cluster
    volumes:
      - shard3_data:/data/db

  mongos:
    image: mongo:7.0
    container_name: mongos
    ports:
      - 27017:27017
    command: mongos --configdb configReplSet/configsvr:27017 --bind_ip_all --port 27017
    depends_on:
      - configsvr
      - shard1
      - shard2
      - shard3
    networks:
      - mongo-cluster

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongos:27017/
      - MYSQL_HOST=host.docker.internal
    volumes:
      - ./backend:/app
    depends_on:
      - mongos
    networks:
      - mongo-cluster
      - front-end-back-end
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - REACT_APP_API_URL=http://localhost:5000
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - front-end-back-end

volumes:
  configsvr_data:
  shard1_data:
  shard2_data:
  shard3_data:

networks:
  mongo-cluster:
  front-end-back-end:
